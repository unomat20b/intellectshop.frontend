<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>404 — Страница не найдена | IntellectShop</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --text: #0f172a;
        --muted: #475569;
        --accent: #1d4ed8;
        --card: #ffffff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at top right, #dbeafe, var(--bg) 45%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(680px, 100%);
        background: var(--card);
        border-radius: 18px;
        padding: 36px;
        box-shadow: 0 20px 48px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 4vw, 2.5rem);
        line-height: 1.1;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 1.05rem;
      }
      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main>
      <h1>404 — Страница не найдена</h1>
      <p>Ссылка может быть устаревшей или адрес введен с ошибкой.</p>
      <p><a href="/">Вернуться на главную</a></p>
    </main>
  </body>
</html>
