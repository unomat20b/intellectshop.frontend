# Сборка Vite и выкладка ТОЛЬКО содержимого dist в корень public_html на Timeweb (без modx и пр.).
# Секреты: TIMEWEB_SSH_KEY, TIMEWEB_HOST, TIMEWEB_USER, TIMEWEB_REMOTE_PATH (абсолютный путь к public_html).
# Retry marker: no-op change to force a fresh workflow run when network deploy flakes.

name: Build and deploy dist to Timeweb

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: timeweb-frontend-dist
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE: https://intellectshop.net/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install and build
        run: |
          npm ci
          npm run generate-sitemap
          npm run build

      # Ключ из секрета пишем в файл: так надёжнее, чем ssh-agent (CRLF/многострочные секреты).
      - name: SSH key and known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.TIMEWEB_SSH_KEY }}
          TIMEWEB_HOST: ${{ secrets.TIMEWEB_HOST }}
          TIMEWEB_SSH_HOST: ${{ secrets.TIMEWEB_SSH_HOST }}
          TIMEWEB_SSH_PORT: ${{ secrets.TIMEWEB_SSH_PORT }}
        run: |
          set -euo pipefail
          ssh_host="${TIMEWEB_SSH_HOST:-$TIMEWEB_HOST}"
          ssh_port="${TIMEWEB_SSH_PORT:-22}"
          if [[ -z "$ssh_host" ]]; then
            echo "TIMEWEB_HOST/TIMEWEB_SSH_HOST is empty. Set secrets in repository settings." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/timeweb_deploy
          chmod 600 ~/.ssh/timeweb_deploy
          touch ~/.ssh/known_hosts
          scanned=0
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -4 -T 10 -p "$ssh_port" -H "$ssh_host" >> ~/.ssh/known_hosts 2>/dev/null || \
               ssh-keyscan -T 10 -p "$ssh_port" -H "$ssh_host" >> ~/.ssh/known_hosts 2>/dev/null; then
              scanned=1
              break
            fi
            sleep 3
          done
          if [ "$scanned" -ne 1 ]; then
            echo "Warning: ssh-keyscan failed for $ssh_host; continuing with StrictHostKeyChecking=accept-new"
          fi

      - name: Rsync dist → Timeweb (только артефакты сборки)
        env:
          TIMEWEB_HOST: ${{ secrets.TIMEWEB_HOST }}
          TIMEWEB_SSH_HOST: ${{ secrets.TIMEWEB_SSH_HOST }}
          TIMEWEB_SSH_PORT: ${{ secrets.TIMEWEB_SSH_PORT }}
          TIMEWEB_USER: ${{ secrets.TIMEWEB_USER }}
          RPATH: ${{ secrets.TIMEWEB_REMOTE_PATH }}
        run: |
          set -euo pipefail
          test -n "$RPATH"
          ssh_host="${TIMEWEB_SSH_HOST:-$TIMEWEB_HOST}"
          if [[ -z "$ssh_host" ]]; then
            echo "TIMEWEB_HOST/TIMEWEB_SSH_HOST is empty. Set secrets in repository settings." >&2
            exit 1
          fi
          ssh_port="${TIMEWEB_SSH_PORT:-22}"
          remote="$TIMEWEB_USER@$ssh_host"
          echo "Deploy target: $ssh_host:$ssh_port"

          ssh_opts="-p $ssh_port -i $HOME/.ssh/timeweb_deploy -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=3"

          for attempt in 1 2 3 4 5; do
            if rsync -avz --delete --timeout=120 -e "ssh $ssh_opts" dist/assets/ "$remote:$RPATH/assets/"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Failed to rsync assets after 5 attempts" >&2
              exit 1
            fi
            sleep 5
          done

          # SSG pages with nested dir style:
          # copy first-level route directories (e.g. /about/index.html, /services/index.html)
          mapfile -t prerender_dirs < <(find dist -mindepth 1 -maxdepth 1 -type d ! -name assets ! -name .vite)
          for dir in "${prerender_dirs[@]}"; do
            dname="$(basename "$dir")"
            for attempt in 1 2 3 4 5; do
              if rsync -avz --delete --timeout=120 -e "ssh $ssh_opts" "$dir/" "$remote:$RPATH/$dname/"; then
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                echo "Failed to rsync prerender dir '$dname' after 5 attempts" >&2
                exit 1
              fi
              sleep 5
            done
          done

          mapfile -t root_files < <(find dist -maxdepth 1 -type f)
          if [[ ${#root_files[@]} -gt 0 ]]; then
            for attempt in 1 2 3 4 5; do
              if rsync -avz --timeout=120 -e "ssh $ssh_opts" "${root_files[@]}" "$remote:$RPATH/"; then
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                echo "Failed to copy root files after 5 attempts" >&2
                exit 1
              fi
              sleep 5
            done
          fi
