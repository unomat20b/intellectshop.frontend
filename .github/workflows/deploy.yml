# Сборка Vite и выкладка ТОЛЬКО содержимого dist в корень public_html на Timeweb (без modx и пр.).
# Секреты: TIMEWEB_SSH_KEY, TIMEWEB_HOST, TIMEWEB_USER, TIMEWEB_REMOTE_PATH (абсолютный путь к public_html).

name: Build and deploy dist to Timeweb

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: timeweb-frontend-dist
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE: https://intellectshop.net/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install and build
        run: |
          npm ci
          npm run generate-sitemap
          npm run build

      # Ключ из секрета пишем в файл: так надёжнее, чем ssh-agent (CRLF/многострочные секреты).
      - name: SSH key and known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.TIMEWEB_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/timeweb_deploy
          chmod 600 ~/.ssh/timeweb_deploy
          touch ~/.ssh/known_hosts
          scanned=0
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -4 -T 10 -H "${{ secrets.TIMEWEB_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || \
               ssh-keyscan -T 10 -H "${{ secrets.TIMEWEB_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null; then
              scanned=1
              break
            fi
            sleep 3
          done
          if [ "$scanned" -ne 1 ]; then
            echo "Warning: ssh-keyscan failed for ${{ secrets.TIMEWEB_HOST }}; continuing with StrictHostKeyChecking=accept-new"
          fi

      - name: Rsync dist → Timeweb (только артефакты сборки)
        env:
          TIMEWEB_HOST: ${{ secrets.TIMEWEB_HOST }}
          TIMEWEB_SSH_HOST: ${{ secrets.TIMEWEB_SSH_HOST }}
          TIMEWEB_SSH_PORT: ${{ secrets.TIMEWEB_SSH_PORT }}
          TIMEWEB_USER: ${{ secrets.TIMEWEB_USER }}
          TIMEWEB_FTP_HOST: ${{ secrets.TIMEWEB_FTP_HOST }}
          TIMEWEB_FTP_USER: ${{ secrets.TIMEWEB_FTP_USER }}
          TIMEWEB_FTP_PASSWORD: ${{ secrets.TIMEWEB_FTP_PASSWORD }}
          TIMEWEB_FTP_PATH: ${{ secrets.TIMEWEB_FTP_PATH }}
          TIMEWEB_FTP_SSL: ${{ secrets.TIMEWEB_FTP_SSL }}
          RPATH: ${{ secrets.TIMEWEB_REMOTE_PATH }}
        run: |
          set -euo pipefail
          test -n "$RPATH"
          ssh_host="${TIMEWEB_SSH_HOST:-$TIMEWEB_HOST}"
          if [[ -z "$ssh_host" ]]; then
            echo "TIMEWEB_HOST/TIMEWEB_SSH_HOST is empty. Set secrets in repository settings." >&2
            exit 1
          fi

          # Build host candidate list:
          # 1) literal configured host (preferred)
          # 2) all resolved IPv4 addresses (for diagnostics/fallback)
          host_candidates=("$ssh_host")
          if [[ "$ssh_host" != *:* && ! "$ssh_host" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            mapfile -t resolved_ipv4s < <(getent ahostsv4 "$ssh_host" | awk '{print $1}' | sort -u)
            for ip in "${resolved_ipv4s[@]}"; do
              [[ -n "$ip" ]] || continue
              host_candidates+=("$ip")
            done
          fi

          # Build port candidate list:
          # 1) explicit secret TIMEWEB_SSH_PORT if present
          # 2) common SSH ports
          port_candidates=()
          if [[ -n "${TIMEWEB_SSH_PORT:-}" ]]; then
            port_candidates+=("$TIMEWEB_SSH_PORT")
          fi
          port_candidates+=(22 2222)

          # Deduplicate candidates while preserving order.
          deduped_hosts=()
          declare -A seen_hosts=()
          for host in "${host_candidates[@]}"; do
            if [[ -n "$host" && -z "${seen_hosts[$host]:-}" ]]; then
              deduped_hosts+=("$host")
              seen_hosts["$host"]=1
            fi
          done

          deduped_ports=()
          declare -A seen_ports=()
          for port in "${port_candidates[@]}"; do
            if [[ -n "$port" && -z "${seen_ports[$port]:-}" ]]; then
              deduped_ports+=("$port")
              seen_ports["$port"]=1
            fi
          done

          selected_host=""
          selected_port=""

          ftp_host="${TIMEWEB_FTP_HOST:-$TIMEWEB_HOST}"
          ftp_user="${TIMEWEB_FTP_USER:-$TIMEWEB_USER}"
          ftp_password="${TIMEWEB_FTP_PASSWORD:-}"
          ftp_path="${TIMEWEB_FTP_PATH:-$RPATH}"
          ftp_ssl="${TIMEWEB_FTP_SSL:-true}"

          deploy_via_ftp() {
            if [[ -z "$ftp_host" || -z "$ftp_user" || -z "$ftp_password" ]]; then
              return 1
            fi

            if ! command -v lftp >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y lftp
            fi

            if [[ "${ftp_ssl,,}" == "false" || "${ftp_ssl}" == "0" || "${ftp_ssl,,}" == "no" ]]; then
              echo "Deploying via plain FTP fallback to $ftp_host:$ftp_path"
              lftp -u "$ftp_user","$ftp_password" "$ftp_host" -e "set cmd:fail-exit true; set net:max-retries 2; set net:reconnect-interval-base 5; set net:timeout 20; set ftp:passive-mode true; mkdir -p \"$ftp_path\"; mirror -R --delete --verbose dist \"$ftp_path\"; bye"
            else
              echo "Deploying via FTPS fallback to $ftp_host:$ftp_path"
              lftp -u "$ftp_user","$ftp_password" "$ftp_host" -e "set cmd:fail-exit true; set net:max-retries 2; set net:reconnect-interval-base 5; set net:timeout 20; set ftp:passive-mode true; set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate false; mkdir -p \"$ftp_path\"; mirror -R --delete --verbose dist \"$ftp_path\"; bye"
            fi
          }

          for host in "${deduped_hosts[@]}"; do
            for port in "${deduped_ports[@]}"; do
              echo "Checking TCP $host:$port"
              if timeout 6 bash -c "cat < /dev/null > /dev/tcp/$host/$port" 2>/dev/null; then
                selected_host="$host"
                selected_port="$port"
                break 2
              fi
            done
          done

          if [[ -z "$selected_host" || -z "$selected_port" ]]; then
            echo "No reachable SSH endpoint from GitHub runner."
            echo "Checked hosts: ${deduped_hosts[*]}"
            echo "Checked ports: ${deduped_ports[*]}"
            if deploy_via_ftp; then
              echo "SSH unavailable; FTPS/FTP fallback deploy completed."
              exit 0
            fi
            echo "If this is Timeweb shared hosting, ensure SSH is enabled in 'Статус сервисов' and use server hostname from 'Доступ по FTP' as TIMEWEB_SSH_HOST." >&2
            echo "Or set FTP secrets TIMEWEB_FTP_HOST, TIMEWEB_FTP_USER, TIMEWEB_FTP_PASSWORD, TIMEWEB_FTP_PATH for FTPS fallback." >&2
            exit 1
          fi

          remote="$TIMEWEB_USER@$selected_host"
          echo "Deploy target: $selected_host:$selected_port (source host: $ssh_host)"

          ssh_opts="-4 -o AddressFamily=inet -p $selected_port -i $HOME/.ssh/timeweb_deploy -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=3"

          for attempt in 1 2 3 4 5; do
            if rsync -avz --delete --timeout=120 -e "ssh $ssh_opts" dist/assets/ "$remote:$RPATH/assets/"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Failed to rsync assets after 5 attempts" >&2
              if deploy_via_ftp; then
                echo "SSH rsync failed; FTPS/FTP fallback deploy completed."
                exit 0
              fi
              exit 1
            fi
            sleep 5
          done

          # SSG pages with nested dir style:
          # copy first-level route directories (e.g. /about/index.html, /services/index.html)
          mapfile -t prerender_dirs < <(find dist -mindepth 1 -maxdepth 1 -type d ! -name assets ! -name .vite)
          for dir in "${prerender_dirs[@]}"; do
            dname="$(basename "$dir")"
            for attempt in 1 2 3 4 5; do
              if rsync -avz --delete --timeout=120 -e "ssh $ssh_opts" "$dir/" "$remote:$RPATH/$dname/"; then
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                echo "Failed to rsync prerender dir '$dname' after 5 attempts" >&2
                if deploy_via_ftp; then
                  echo "SSH rsync failed on prerender dirs; FTPS/FTP fallback deploy completed."
                  exit 0
                fi
                exit 1
              fi
              sleep 5
            done
          done

          mapfile -t root_files < <(find dist -maxdepth 1 -type f)
          if [[ ${#root_files[@]} -gt 0 ]]; then
            for attempt in 1 2 3 4 5; do
              if scp -4 -o AddressFamily=inet -o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=3 \
                -i "$HOME/.ssh/timeweb_deploy" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
                "${root_files[@]}" "$remote:$RPATH/"; then
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                echo "Failed to copy root files after 5 attempts" >&2
                if deploy_via_ftp; then
                  echo "SSH scp failed; FTPS/FTP fallback deploy completed."
                  exit 0
                fi
                exit 1
              fi
              sleep 5
            done
          fi
